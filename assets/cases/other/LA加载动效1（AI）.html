<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频打板Loading动画</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            margin: 0;
        }
        .video-loader {
            width: 160px;
            height: 160px;
            overflow: visible;
        }
        .clapper-whole {
            transform-origin: center center;
            transform-box: fill-box;
            animation: whole-bounce-rotate 1.8s cubic-bezier(0.25, 1, 0.5, 1) infinite;
        }
        .clapper-top {
            /* 旋转轴心调整到上半部分左下角：SVG坐标(5.37,23.02)，即自身的左下角 */
            transform-origin: 5.37px 23.02px; /* 改为上半部分的左下角像素坐标，去掉错误的逗号 */
            transform-box: fill-box;
            /* 微调水平偏移实现精准对齐 */
            transform: translate(2.38px, 6.27px);
            animation: tap-action 1.8s infinite;
        }
        @keyframes tap-action {
            0%, 5% { transform: translate(2.38px, 6.27px) rotate(0deg); }
            35% { 
                transform: translate(2.38px, 6.27px) rotate(-35deg); 
                animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
            }
            50% { transform: translate(2.38px, 6.27px) rotate(-35deg); }
            58% { transform: translate(2.38px, 6.27px) rotate(0deg); }
            100% { transform: translate(2.38px, 6.27px) rotate(0deg); }
        }
        @keyframes whole-bounce-rotate {
            0%, 55% { transform: scale(1) rotate(0deg); }
            58% { transform: scale(0.94) rotate(3deg); }
            70% { transform: scale(1.02) rotate(-1.5deg); }
            85%, 100% { transform: scale(1) rotate(0deg); }
        }
    </style>
</head>
<body>
