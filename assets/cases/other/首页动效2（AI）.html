<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A1 首页动效预览 v2</title>
  <style>
    :root {
      --page-bg: #081018;
      --frame-bg: #0b1019;
      --aurora-cyan: #00ffff;
      --aurora-blue: #527df1;
      --aurora-purple: #901ae6;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(82, 125, 241, 0.18), transparent 32%),
        linear-gradient(180deg, #050a12 0%, #081018 42%, #0a1119 100%);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    .stage {
      position: relative;
      width: min(100vw, 1440px);
      aspect-ratio: 1440 / 900;
      overflow: hidden;
      background: var(--frame-bg);
    }

    .source-frame,
    .aurora-frame,
    .aurora-shell,
    .aurora-canvas,
    .frame-vignette {
      position: absolute;
    }

    .source-frame {
      top: -8px;
      left: -8px;
      z-index: 1;
      width: calc(100% + 16px);
      height: calc(100% + 16px);
      border: 0;
      display: block;
      overflow: hidden;
      background: transparent;
    }

    .aurora-frame {
      left: 0;
      right: 0;
      top: 44px;
      bottom: 34%;
      z-index: 2;
      overflow: hidden;
      pointer-events: none;
      /* 动效注释：Aurora 只允许出现在界面主体框架内，不污染顶部导航。 */
      -webkit-mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.98) 0%, rgba(0, 0, 0, 0.98) 58%, rgba(0, 0, 0, 0.72) 76%, transparent 100%);
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.98) 0%, rgba(0, 0, 0, 0.98) 58%, rgba(0, 0, 0, 0.72) 76%, transparent 100%);
    }

    .aurora-shell {
      inset: 0;
      overflow: hidden;
      opacity: 0.5;
    }

    .aurora-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(60% 34% at 50% 5%, rgba(82, 125, 241, 0.24), transparent 72%),
        radial-gradient(34% 24% at 26% 12%, rgba(0, 255, 255, 0.18), transparent 70%),
        radial-gradient(34% 24% at 74% 12%, rgba(144, 26, 230, 0.18), transparent 72%);
      mix-blend-mode: screen;
      opacity: 0.95;
    }

    .aurora-shell::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(8, 16, 24, 0) 0%, rgba(8, 16, 24, 0.02) 34%, rgba(8, 16, 24, 0.16) 52%, rgba(8, 16, 24, 0.48) 72%, rgba(8, 16, 24, 0.88) 100%),
        radial-gradient(52% 26% at 50% 0%, rgba(255, 255, 255, 0.06), transparent 100%);
    }

    .aurora-canvas {
      inset: -4% -2% auto -2%;
      height: 82%;
      transform: scale(1.03, 1.12);
      transform-origin: top center;
      mix-blend-mode: screen;
      opacity: 1;
      filter: saturate(1.14) brightness(1.04);
    }

    .aurora-canvas canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: transparent;
    }

    .aurora-frame[data-fallback="true"] .aurora-canvas {
      background:
        radial-gradient(34% 18% at 22% 10%, rgba(0, 255, 255, 0.66), transparent 74%),
        radial-gradient(46% 22% at 54% 8%, rgba(82, 125, 241, 0.76), transparent 74%),
        radial-gradient(38% 20% at 82% 10%, rgba(144, 26, 230, 0.7), transparent 74%),
        linear-gradient(180deg, rgba(0, 255, 255, 0.08) 0%, rgba(82, 125, 241, 0.12) 28%, rgba(144, 26, 230, 0.05) 56%, transparent 88%);
      filter: blur(30px) saturate(1.16) brightness(1.04);
      animation: fallbackFlow 8s linear infinite alternate;
    }

    .frame-vignette {
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(5, 9, 16, 0.08) 0%, transparent 12%, transparent 80%, rgba(5, 9, 16, 0.16) 100%),
        radial-gradient(circle at center, transparent 58%, rgba(5, 9, 16, 0.08) 100%);
    }

    @keyframes fallbackFlow {
      0% {
        transform: translate3d(-2%, -1%, 0) scale(1.02, 1.28);
      }

      50% {
        transform: translate3d(2%, 1%, 0) scale(1.07, 1.34);
      }

      100% {
        transform: translate3d(4%, -2%, 0) scale(1.06, 1.32);
      }
    }

    @media (max-width: 1100px) {
      .aurora-canvas {
        height: 56%;
        transform: scale(1.08, 1.28);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .aurora-frame[data-fallback="true"] .aurora-canvas {
        animation: none;
      }
    }
  </style>
</head>

  <script type="module">
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const auroraRoot = document.getElementById('aurora-canvas');
    const auroraFrame = document.querySelector('.aurora-frame');
    const sourceFrame = document.querySelector('.source-frame');
    const embeddedSource = document.getElementById('embedded-source');

    if (sourceFrame && embeddedSource) {
      const svgMarkup = embeddedSource.innerHTML.replace(/<\?xml[^>]*>\s*/i, '').trim();
      sourceFrame.srcdoc = `<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }

      svg {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>${svgMarkup}</body>
</html>`;
    }

    const VERT = `#version 300 es
in vec2 position;
void main() {
  gl_Position = vec4(position, 0.0, 1.0);
}`;

    const FRAG = `#version 300 es
precision highp float;

uniform float uTime;
uniform float uAmplitude;
uniform vec3 uColorStops[3];
uniform vec2 uResolution;
uniform float uBlend;

out vec4 fragColor;

vec3 permute(vec3 x) {
  return mod(((x * 34.0) + 1.0) * x, 289.0);
}

float snoise(vec2 v){
  const vec4 C = vec4(
    0.211324865405187, 0.366025403784439,
    -0.577350269189626, 0.024390243902439
  );
  vec2 i = floor(v + dot(v, C.yy));
  vec2 x0 = v - i + dot(i, C.xx);
  vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
  vec4 x12 = x0.xyxy + C.xxzz;
  x12.xy -= i1;
  i = mod(i, 289.0);

  vec3 p = permute(
    permute(i.y + vec3(0.0, i1.y, 1.0))
    + i.x + vec3(0.0, i1.x, 1.0)
  );

  vec3 m = max(
    0.5 - vec3(
      dot(x0, x0),
      dot(x12.xy, x12.xy),
      dot(x12.zw, x12.zw)
    ),
    0.0
  );
  m = m * m;
  m = m * m;

  vec3 x = 2.0 * fract(p * C.www) - 1.0;
  vec3 h = abs(x) - 0.5;
  vec3 ox = floor(x + 0.5);
  vec3 a0 = x - ox;
  m *= 1.79284291400159 - 0.85373472095314 * (a0 * a0 + h * h);

  vec3 g;
  g.x = a0.x * x0.x + h.x * x0.y;
  g.yz = a0.yz * x12.xz + h.yz * x12.yw;
  return 130.0 * dot(m, g);
}

struct ColorStop {
  vec3 color;
  float position;
};

#define COLOR_RAMP(colors, factor, finalColor) { \
  int index = 0; \
  for (int i = 0; i < 2; i++) { \
    ColorStop currentColor = colors[i]; \
    bool isInBetween = currentColor.position <= factor; \
    index = int(mix(float(index), float(i), float(isInBetween))); \
  } \
  ColorStop currentColor = colors[index]; \
  ColorStop nextColor = colors[index + 1]; \
  float range = nextColor.position - currentColor.position; \
  float lerpFactor = (factor - currentColor.position) / range; \
  finalColor = mix(currentColor.color, nextColor.color, lerpFactor); \
}

void main() {
  vec2 uv = gl_FragCoord.xy / uResolution;

  ColorStop colors[3];
  colors[0] = ColorStop(uColorStops[0], 0.0);
  colors[1] = ColorStop(uColorStops[1], 0.5);
  colors[2] = ColorStop(uColorStops[2], 1.0);

  vec3 rampColor;
  COLOR_RAMP(colors, uv.x, rampColor);

  float height = snoise(vec2(uv.x * 2.0 + uTime * 0.1, uTime * 0.25)) * 0.5 * uAmplitude;
  height = exp(height);
  height = (uv.y * 2.0 - height + 0.2);
  float intensity = 0.6 * height;

  float midPoint = 0.20;
  float auroraAlpha = smoothstep(midPoint - uBlend * 0.5, midPoint + uBlend * 0.5, intensity);
  vec3 auroraColor = intensity * rampColor;
  fragColor = vec4(auroraColor * auroraAlpha, auroraAlpha);
}`;

    function createShader(gl, type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);

      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        const info = gl.getShaderInfoLog(shader);
        gl.deleteShader(shader);
        throw new Error(info || 'Shader compile failed');
      }

      return shader;
    }

    function createProgram(gl, vertexSource, fragmentSource) {
      const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexSource);
      const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentSource);
      const program = gl.createProgram();

      gl.attachShader(program, vertexShader);
      gl.attachShader(program, fragmentShader);
      gl.linkProgram(program);

      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        const info = gl.getProgramInfoLog(program);
        gl.deleteProgram(program);
        gl.deleteShader(vertexShader);
        gl.deleteShader(fragmentShader);
        throw new Error(info || 'Program link failed');
      }

      gl.deleteShader(vertexShader);
      gl.deleteShader(fragmentShader);
      return program;
    }

    function hexToRgbArray(hex) {
      const value = hex.replace('#', '');
      const normalized = value.length === 3
        ? value.split('').map((part) => part + part).join('')
        : value;

      const int = Number.parseInt(normalized, 16);
      return [
        ((int >> 16) & 255) / 255,
        ((int >> 8) & 255) / 255,
        (int & 255) / 255
      ];
    }

    function bootAurora() {
      if (!auroraRoot || !auroraFrame) return;

      try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl2', {
          alpha: true,
          premultipliedAlpha: true,
          antialias: true
        });

        if (!gl) {
          throw new Error('WebGL2 unavailable');
        }

        gl.clearColor(0, 0, 0, 0);
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);
        canvas.style.backgroundColor = 'transparent';
        auroraRoot.appendChild(canvas);

        const colorStops = ['#00FFFF', '#527DF1', '#901AE6'];
        const colorStopsArray = colorStops.flatMap(hexToRgbArray);
        const program = createProgram(gl, VERT, FRAG);

        const positionLocation = gl.getAttribLocation(program, 'position');
        const uTime = gl.getUniformLocation(program, 'uTime');
        const uAmplitude = gl.getUniformLocation(program, 'uAmplitude');
        const uColorStops = gl.getUniformLocation(program, 'uColorStops');
        const uResolution = gl.getUniformLocation(program, 'uResolution');
        const uBlend = gl.getUniformLocation(program, 'uBlend');

        const vao = gl.createVertexArray();
        gl.bindVertexArray(vao);

        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(
          gl.ARRAY_BUFFER,
          new Float32Array([
            -1, -1,
            3, -1,
            -1, 3
          ]),
          gl.STATIC_DRAW
        );

        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);
        gl.bindVertexArray(null);

        function resize() {
          const width = auroraRoot.offsetWidth;
          const height = auroraRoot.offsetHeight;
          const dpr = window.devicePixelRatio || 1;
          canvas.width = Math.max(1, Math.round(width * dpr));
          canvas.height = Math.max(1, Math.round(height * dpr));
          canvas.style.width = `${width}px`;
          canvas.style.height = `${height}px`;
          gl.viewport(0, 0, canvas.width, canvas.height);
        }

        resize();
        window.addEventListener('resize', resize);

        let frameId = 0;

        function draw(timeValue) {
          gl.useProgram(program);
          gl.bindVertexArray(vao);
          gl.uniform1f(uTime, timeValue);
          // 动效注释：这里把振幅与混合强度拉高，让顶部光幕更接近 ReactBits 原版的明显流动感。
          gl.uniform1f(uAmplitude, 1.9);
          gl.uniform3fv(uColorStops, new Float32Array(colorStopsArray));
          gl.uniform2f(uResolution, canvas.width, canvas.height);
          gl.uniform1f(uBlend, 0.98);
          gl.clear(gl.COLOR_BUFFER_BIT);
          gl.drawArrays(gl.TRIANGLES, 0, 3);
          gl.bindVertexArray(null);
        }

        const render = (t) => {
          frameId = requestAnimationFrame(render);
          // 动效注释：速度调高，让上方颜色带的横向流动更明显，但仍保留原版 Aurora 的平滑感。
          draw((t * 0.01) * 1.45 * 0.1);
        };

        if (prefersReducedMotion) {
          draw(0.42);
        } else {
          frameId = requestAnimationFrame(render);
        }

        auroraFrame.dataset.fallback = 'false';

        window.addEventListener('pagehide', () => {
          cancelAnimationFrame(frameId);
          window.removeEventListener('resize', resize);
          gl.deleteBuffer(buffer);
          gl.deleteVertexArray(vao);
          gl.deleteProgram(program);
          gl.getExtension('WEBGL_lose_context')?.loseContext();
        }, { once: true });
      } catch (error) {
        console.warn('Aurora 原生 WebGL2 初始化失败，回退到本地增强版 CSS 光幕。', error);
        auroraFrame.dataset.fallback = 'true';
      }
    }

    bootAurora();
  </script>
