<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器人动画预览 - 顺滑上弧线转头</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a24;
        }

        svg {
            width: 190px;
            height: 190px;
        }

        /* 动画：快速眨眼两下 */
        #eye1-anim, #eye2-anim {
            transform-origin: center;
            transform-box: fill-box;
            animation: fastBlink 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* 头部（脸部白底、天线）：配合主体的位移 */
        #head-shape {
            /* 
               为了保证从左到上再到右的弧线过程中完全没有顿感，
               这里将 cubic-bezier 调整为更有利于中间平滑穿过的曲线(甚至接近 linear)，
               或者干脆用 ease-in-out，让动作最两端慢，中间过程保持连贯速度。
            */
            animation: headShift 6s ease-in-out infinite;
        }

        /* 眼镜及眼睛整体：X轴(左右)、Y轴(上下)位移 + 宽度压缩 */
        #glasses-group {
            transform-origin: 16px 18.5px;
            animation: glassesShift 6s ease-in-out infinite;
        }
        
        /* 左耳 */
        #ear1-anim { 
            transform-origin: 5.8px 18.2px; 
            animation: leftEarShift 6s ease-in-out infinite;
        }
        
        /* 右耳 */
        #ear2-anim { 
            transform-origin: 26.1px 18.2px; 
            animation: rightEarShift 6s ease-in-out infinite;
        }

        /* 修改：在回到原点（0%/100%附近）时快速连续眨眼两次 */
        @keyframes fastBlink {
            0%, 4%, 7%, 10%, 15%, 100% { transform: scaleY(1); }
            5%, 6% { transform: scaleY(0.1); }  /* 第一次眨眼 */
            8%, 9% { transform: scaleY(0.1); }  /* 第二次眨眼 */
        }

        /* 
           ---------------- 动画节奏重新规划 ----------------
           为了让“上方”只是一个路过的点，它不再是某个拥有足够停留时间的独立关键帧。
           20%: 开始往左转到达最左极限
           50%: 从左侧往右侧划过，中间在上方达到最高点，不停留
           80%: 划到右侧极限
           100%: 回到正中间
        */

        @keyframes headShift {
            0% { transform: translate(0px, 0px); }
            /* 左端点 */
            20% { transform: translate(-1.5px, 0px); } 
            
            /* 中间经过上方，不停留，配合左右位移从-1.5变成1.5，这里只是Y轴有一个顶峰 */
            50% { transform: translate(0px, -1.5px); }
            
            /* 右端点 */
            80% { transform: translate(1.5px, 0px); }  
            100% { transform: translate(0px, 0px); }
        }

        @keyframes glassesShift {
            0% { transform: translate(0px, 0px) scale(1, 1); }
            
            /* 左端点：宽度被压缩 */
            20% { transform: translate(-4.5px, 0px) scale(0.75, 1); } 
            
            /* 经过上方最高点：此时横向位移为0（经过正中间），高度由于抬头被微缩，宽度因回到正面恢复为1 */
            50% { transform: translate(0px, -2.5px) scale(1, 0.85); }
            
            /* 右端点：宽度被压缩 */
            80% { transform: translate(4.5px, 0px) scale(0.75, 1); } 
            100% { transform: translate(0px, 0px) scale(1, 1); }
        }

        /* 耳朵透视修改规则：
           面朝方向（远端）的耳朵：彻底消失 / 被遮挡 (scale: 0)
           背朝方向（近端）的耳朵：虽在正面但也因透视发生一些明显的缩减 (这里设定压缩为 0.5 或者 0.6)
        */
        @keyframes leftEarShift {
            /* 正面常态 */
            0% { transform: translateX(0px) scale(1, 1); opacity: 1; }
            
            /* 脸往左转 -> 左边成为后背（同侧） -> 彻底消失 */
            20% { transform: translateX(3px) scale(0, 1); opacity: 0; } 
            
            /* 往上看路过 -> 恢复常态略往下走 */
            50% { transform: translate(0px, 1.5px) scale(1, 1); opacity: 1; }
            
            /* 脸往右转 -> 左边成为完全可见的面（另一侧） -> 缩小一半 */
            80% { transform: translateX(1.5px) scale(0.5, 1); opacity: 1; } 
            100% { transform: translateX(0px) scale(1, 1); opacity: 1; }
        }

        @keyframes rightEarShift {
            0% { transform: translateX(0px) scale(1, 1); opacity: 1; }
            
            /* 脸往左转 -> 右侧成为可见的面 -> 缩小一半 */
            20% { transform: translateX(-1.5px) scale(0.5, 1); opacity: 1; } 
            
            /* 往上看路过 */
            50% { transform: translate(0px, 1.5px) scale(1, 1); opacity: 1; }
            
            /* 脸往右转 -> 右边成为后背（同侧） -> 彻底消失 */
            80% { transform: translateX(-3px) scale(0, 1); opacity: 0; } 
            100% { transform: translateX(0px) scale(1, 1); opacity: 1; }
        }
    </style>
</head>
