<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Paper Elastic Bounce - White Background</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff; /* 已修改为纯白 */
            margin: 0;
        }

        svg {
            width: 160px;
            height: 160px;
        }

        /* ================== 核心配置 ================== */

        #test-paper {
            animation: loop-fade 2s linear infinite;
            transform-origin: center top;
            will-change: opacity, transform;
        }

        /* 1. 试卷主体：多重回弹 */
        .bounce-wrapper {
            animation: paper-elastic-bounce 2s infinite;
        }

        /* 2. 试卷生长：快速展开 */
        #mask-paper-rect {
            animation: paper-grow 2s cubic-bezier(0.3, 0, 0.2, 1) infinite;
        }

        /* 3. 文本行：带回弹的生长 */
        .text-mask-rect {
            animation-duration: 2s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }
        #tm-1 { animation-name: text-elastic-1; } 
        #tm-2 { animation-name: text-elastic-2; } 
        #tm-3 { animation-name: text-elastic-3; } 


        /* ================== 关键帧定义 ================== */

        @keyframes loop-fade {
            0% { opacity: 1; }
            85% { opacity: 1; }
            95% { opacity: 0; transform: scale(0.96); }
            100% { opacity: 0; transform: scale(0.96); }
        }

        /* 多重阻尼回弹 */
        @keyframes paper-elastic-bounce {
            0% { transform: translateY(0); animation-timing-function: ease-in; }
            18% { transform: translateY(6px); animation-timing-function: ease-out; }
            32% { transform: translateY(-3px); animation-timing-function: ease-in-out; }
            45% { transform: translateY(2px); animation-timing-function: ease-in-out; }
            56% { transform: translateY(-1px); animation-timing-function: ease-in-out; }
            68% { transform: translateY(0); }
            100% { transform: translateY(0); }
        }

        @keyframes paper-grow {
            0% { height: 0; }
            20% { height: 64px; }
            100% { height: 64px; }
        }

        /* 文本弹性生长 (Overshoot) */
        @keyframes text-elastic-1 {
            0%, 5% { width: 0; }
            22% { width: 55px; } /* 冲过头 */
            30%, 100% { width: 50px; } /* 缩回 */
        }

        @keyframes text-elastic-2 {
            0%, 15% { width: 0; }
            32% { width: 55px; }
            40%, 100% { width: 50px; }
        }

        @keyframes text-elastic-3 {
            0%, 25% { width: 0; }
            42% { width: 55px; }
            50%, 100% { width: 50px; }
        }

    </style>
</head>
<body>

        <clipPath id="cp-paper">

        <clipPath id="cp-text">
            <rect id="tm-1" class="text-mask-rect" x="15" y="14" width="0" height="8" />

                </g>
            </g>
        </g>
    </g>
</svg>

</body>
</html>
