<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A1-首页 Aurora Motion v8</title>
    <style>
        :root {
            --aurora: repeating-linear-gradient(100deg, #8ec5ff 10%, #d4dcff 15%, #cfe6ff 20%, #f0e8ff 25%, #a9d4ff 30%);
            --white-gradient: repeating-linear-gradient(100deg, #fff 0%, #fff 7%, transparent 10%, transparent 12%, #fff 16%);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: #f4f7fb;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .stage {
            position: relative;
            width: min(100vw - 48px, 1440px);
        }

        .page-svg {
            display: block;
            width: 100%;
            height: auto;
        }

        /* 动效注释：上半部分白底区域的极光容器，只负责裁切，不直接参与颜色计算 */
        .aurora-region {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            border-radius: 12px 12px 0 0;
        }

        .aurora-stream,
        .aurora-stream::after {
            content: "";
            position: absolute;
            pointer-events: none;
        }

        /* 动效注释：照搬 Aurora Background 的核心机制，保留双层渐变、模糊、反相与差值混合 */
        .aurora-stream {
            inset: -10px -56px -110px -56px;
            background-image: var(--white-gradient), var(--aurora);
            background-size: 300% 100%, 200% 100%;
            background-position: 50% 50%, 50% 50%;
            opacity: 0.48;
            filter: blur(10px) invert(1);
            will-change: background-position;
            mix-blend-mode: difference;
            animation: aurora 120s linear infinite;
            mask-image: radial-gradient(ellipse at 74% 6%, rgba(0, 0, 0, 1) 12%, rgba(0, 0, 0, 0.95) 28%, rgba(0, 0, 0, 0.72) 50%, rgba(0, 0, 0, 0.3) 72%, transparent 88%),
                linear-gradient(to bottom, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0.98) 12%, rgba(0, 0, 0, 0.82) 26%, rgba(0, 0, 0, 0.5) 42%, rgba(0, 0, 0, 0.2) 58%, rgba(0, 0, 0, 0.06) 72%, transparent 88%);
            transform: translateZ(0);
        }

        /* 动效注释：第二层跟随参考案例做不同尺寸的背景流动，增加层次感与颗粒变化 */
        .aurora-stream::after {
            inset: 0;
            background-image: var(--white-gradient), var(--aurora);
            background-size: 200% 100%, 100% 100%;
            background-position: 50% 50%, 50% 50%;
            background-attachment: fixed;
            mix-blend-mode: difference;
            animation: aurora 120s linear infinite;
        }

        /* 动效注释：底部白雾过渡层，辅助加强极光从上到下的自然渐隐 */
        .aurora-fade {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 156px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.18) 20%, rgba(255, 255, 255, 0.62) 60%, #fff 100%);
        }

        /* 动效注释：与参考案例一致的长周期线性平移，保证无缝循环 */
        @keyframes aurora {
            from {
                background-position: 50% 50%, 50% 50%;
            }

            to {
                background-position: 350% 50%, 350% 50%;
            }
        }

        /* 动效注释：标题打字容器，宽度固定，使用等宽光标模拟输入 */
        .typing-title-wrap {
            width: 430px;
            height: 44px;
            display: flex;
            align-items: center;
            color: #183A5E;
            font-size: 28px;
            line-height: 36px;
            font-weight: 500;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            white-space: nowrap;
            overflow: hidden;
        }

        .typing-title-text {
            display: inline-block;
        }

        /* 动效注释：打字光标会跟随文本推进，末尾短闪后消失 */
        .typing-title-cursor {
            width: 2px;
            height: 30px;
            margin-left: 4px;
            border-radius: 999px;
            background: #183A5E;
            flex: 0 0 auto;
            opacity: 0;
        }

        .typing-title-cursor.is-visible {
            opacity: 1;
        }

        .typing-title-cursor.is-blinking {
            animation: typingCursorBlink 1s steps(1, end) 3;
        }

        /* 动效注释：公告裁切在白卡顶部区域内，从右向左弹入 */
        .notice-mask {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 12px 12px 0 0;
        }

        .notice-card {
            position: absolute;
            top: 12px;
            right: 20px;
            width: 280px;
            height: 32px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 16px;
            border-radius: 16px;
            background: rgba(30, 145, 255, 0.15);
            color: #183A5E;
            font-size: 14px;
            line-height: 22px;
            transform: translateX(56px) scale(0.98);
            opacity: 0;
            will-change: transform, opacity;
        }

        .notice-card.is-entered {
            animation: noticeSlideIn 700ms cubic-bezier(0, 0, 0.4, 1.2) forwards;
        }

        .notice-icon {
            width: 16px;
            height: 16px;
            flex: 0 0 16px;
        }

        .notice-spacer {
            flex: 1 1 auto;
        }

        .notice-link {
            color: #1E91FF;
        }

        .notice-close {
            width: 16px;
            height: 16px;
            flex: 0 0 16px;
        }

        @keyframes typingCursorBlink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        @keyframes noticeSlideIn {
            0% {
                transform: translateX(56px) scale(0.98);
                opacity: 0;
            }

            65% {
                transform: translateX(-10px) scale(1);
                opacity: 1;
            }

            80% {
                transform: translateX(5px) scale(1);
                opacity: 1;
            }

            92% {
                transform: translateX(-2px) scale(1);
                opacity: 1;
            }

            96% {
                transform: translateX(1px) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

    <script>
        (function () {
            const title = "你好张茜文，随时为你答疑解惑";
            const textNode = document.getElementById("typing-title-text");
            const cursorNode = document.getElementById("typing-title-cursor");
            const noticeCard = document.getElementById("notice-card");

            if (!textNode || !cursorNode || !noticeCard) {
                return;
            }

            let index = 0;
            const typeInterval = 95;

            const tick = () => {
                textNode.textContent = title.slice(0, index);

                if (index < title.length) {
                    index += 1;
                    window.setTimeout(tick, typeInterval);
                    return;
                }

                cursorNode.classList.add("is-blinking");
                window.setTimeout(() => {
                    cursorNode.classList.remove("is-visible", "is-blinking");
                }, 3000);
            };

            window.setTimeout(() => {
                tick();
            }, 220);

            window.setTimeout(() => {
                noticeCard.classList.add("is-entered");
            }, 680);
        }());
    </script>
